[alphavantage]
api_key = "your_api_key_here"

# Max API requests per minute (defaults to 75 when omitted)
rate_limit_per_minute = 75

# Optionally override the API base URL (e.g. for a proxy)
# base_url = "https://www.alphavantage.co/query"

[cache]
# Path to the DuckDB database file (created automatically)
path = "data/commodities.duckdb"

[ingest]
# Series to fetch when running `proteus ingest`.
# Commodity names: wti, brent, natural_gas, copper, aluminum, wheat, corn,
#                  cotton, sugar, coffee, gold, silver, all_commodities
# Intervals: daily, weekly, monthly, quarterly, annual
series = [
    { commodity = "wti", interval = "monthly" },
    { commodity = "brent", interval = "monthly" },
    { commodity = "natural_gas", interval = "weekly" },
    { commodity = "copper", interval = "quarterly" },
    { commodity = "wheat", interval = "monthly" },
    { commodity = "gold", interval = "monthly" },
    { commodity = "silver", interval = "monthly" },
]
